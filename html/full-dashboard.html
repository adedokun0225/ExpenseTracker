<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Expenses</title>
    <link rel="stylesheet" href="../css/front.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>
  <body>
    <div id="mainContent">
      <h1>Dashboard</h1>
      <p>Welcome back! Here is your financial summary.</p>

      <!-- BUDGET SETTING -->
      <div id="budgetSection">
        <label for="budgetInput">Set Monthly Budget:</label>
        <input type="number" id="budgetInput" placeholder="e.g. 1500" />
        <button id="setBudgetBtn">Set Budget</button>
      </div>

      <!-- BUDGET PROGRESS -->
      <div id="budgetProgressSection">
        <p id="budgetLabel">Monthly Budget: $0 | Spent: $0 | Remaining: $0</p>
        <div id="budgetBar">
          <div id="budgetBarFill"></div>
        </div>
        <p id="budgetWarningMessage"></p>
      </div>

      <!-- SUMMARY CARDS -->
      <div id="summaryCards">
        <div id="cardIncome">
          <p>Total Income</p>
          <h2 id="totalIncome">$0.00</h2>
        </div>

        <div id="cardExpenses">
          <p>Total Expenses</p>
          <h2 id="totalExpenses">$0.00</h2>
        </div>

        <div id="cardBalance">
          <p>Net Balance</p>
          <h2 id="netBalance">$0.00</h2>
        </div>
      </div>

      <!-- BUDGET WARNING BANNER -->
      <div id="budgetWarningBanner">
        <p id="warningText">Set your budget to see spending alerts.</p>
      </div>

      <!-- RECENT TRANSACTIONS -->
      <div id="recentTransactions">
        <h3>Recent Transactions</h3>
        <div id="transactionsList">
          <!-- Transactions will be added here by JavaScript -->
        </div>
      </div>

      <!-- SPENDING BY CATEGORY -->
      <div id="spendingCategories">
        <h3>Spending by Category</h3>
        <div id="categoriesList">
          <!-- Category bars will be added here by JavaScript -->
        </div>
      </div>
    </div>
    <script src="../js/sidebar.js"></script>
    <script src="../js/dashboard.js"></script>
  </body>
</html>
